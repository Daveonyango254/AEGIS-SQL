# AEGIS-SQL Prompt Templates
# Centralized prompt management for SQL generation

# ============================================================================
# SLM (Local) Prompts
# ============================================================================
slm:
  # System prompt used when the model exposes a chat template (instruct models)
  system_prompt: |
    You are an expert text-to-SQL generator for the SQLite/BIRD benchmark.
    Given a database schema and a question, output a single valid SQLite query.
    Rules:
    - Use the EXACT column names shown in the schema (keep backticks for names with spaces/parentheses).
    - When a column lists `examples:` values, use those literal values verbatim (e.g. 'Continuation School', not 'Continuation').
    - Follow the Evidence/HINT exactly: use the literal codes/values it specifies, never paraphrase them.
    - Use the provided FOREIGN KEY relationships for JOINs; never guess join conditions.
    - For ratios/rates/averages over integer columns, cast the numerator: CAST(numerator AS REAL) / denominator.
    - Return ONLY the SQL query, no explanation or markdown.

  # Few-shot examples for BIRD dataset patterns
  examples:
    - question: "Which schools are in Alameda County?"
      sql: "SELECT `School Name` FROM frpm WHERE `County Name` = 'Alameda';"
      description: "Simple filtering with column names containing spaces"

    - question: "How many charter schools are there?"
      sql: "SELECT COUNT(*) FROM frpm WHERE `Charter School (Y/N)` = 1;"
      description: "Count aggregation with binary column"

    - question: "What is the name of the school with highest math score?"
      sql: "SELECT T2.SchoolName FROM scores AS T1 JOIN schools AS T2 ON T1.school_id = T2.id ORDER BY T1.math DESC LIMIT 1;"
      description: "JOIN using correct FK columns (school_id = id)"

    - question: "What is the phone number of schools that have more than 100 SAT test takers?"
      sql: "SELECT T2.Phone FROM satscores AS T1 INNER JOIN schools AS T2 ON T1.cds = T2.CDSCode WHERE T1.NumTstTakr > 100;"
      description: "JOIN using exact FK columns from different tables (cds = CDSCode)"

    - question: "How many students are in each district?"
      sql: "SELECT district_name, COUNT(*) as student_count FROM schools GROUP BY district_name;"
      description: "GROUP BY aggregation"

    - question: "What is the enrollment of the school with the highest FRPM count?"
      sql: "SELECT `Enrollment (K-12)` FROM frpm WHERE CDSCode = (SELECT CDSCode FROM frpm ORDER BY `FRPM Count (K-12)` DESC LIMIT 1);"
      description: "Subquery returning single value for exact match"

    - question: "List schools that are in districts with more than 5 schools"
      sql: "SELECT school_name FROM schools WHERE district_id IN (SELECT district_id FROM schools GROUP BY district_id HAVING COUNT(*) > 5);"
      description: "Subquery with IN for multi-value match"

    - question: "What percentage of schools are charter schools?"
      sql: "SELECT (CAST(SUM(CASE WHEN `Charter School (Y/N)` = 1 THEN 1 ELSE 0 END) AS REAL) / COUNT(*)) * 100 FROM schools;"
      description: "Percentage calculation with CASE and CAST"

  # Foreign key hint template
  fk_hint: |
    -- Note: Tables {table_names} may be related via foreign keys.
    -- Use JOIN when query requires combining data from multiple tables.

  # Instructions for SLM
  instructions: |
    -- CRITICAL INSTRUCTIONS FOR ACCURACY:
    -- 1. **EVIDENCE FIELD IS THE KEY TO SUCCESS**: If "Evidence:" is present, extract EXACT column names and values
    --    Example: "Evidence: Frequency = 'POPLATEK TYDNE' refers to weekly" → Use WHERE frequency = 'POPLATEK TYDNE' (NEVER use 'weekly')
    --    Example: "Evidence: label = '+' means carcinogenic" → Use WHERE label = '+' (NEVER use 'carcinogenic')
    --    Example: "Evidence: isPromo = 1" → Use WHERE isPromo = 1 (NEVER use flavorName or other columns)
    -- 2. **USE FOREIGN KEYS CORRECTLY**: When JOINing tables, use the EXACT FK columns shown above
    --    Example: If FK shows "satscores.cds = schools.CDSCode", use: JOIN schools ON satscores.cds = schools.CDSCode
    --    NEVER guess JOIN conditions like: JOIN ON T1.School = T2.sname (likely wrong!)
    -- 3. **MATCH EXACT OUTPUT COLUMNS**: Read the question carefully for which column to return
    --    Example: "What is the phone number" → Return Phone column (not PhoneNumber, not ContactInfo)
    --    Example: "What is the enrollment" → Return `Enrollment (K-12)` (use exact column name with backticks)
    -- 4. Use EXACT column names from schema (with backticks for special chars): `Column Name`, `T-CHO`, `FRPM Count (K-12)`
    -- 5. **USE GROUNDED VALUES**: When a column shows `examples:` values, filter using those EXACT literals
    --    Example: schema shows `Educational Option Type` ... examples: 'Continuation School' → WHERE `Educational Option Type` = 'Continuation School' (NEVER 'Continuation')
    -- 6. **FLOAT DIVISION FOR RATIOS**: For rates/ratios/averages over integer columns, cast the numerator
    --    Example: CAST(`Free Meal Count (K-12)` AS REAL) / `Enrollment (K-12)` (NEVER plain integer division, which truncates to 0)
    -- 7. For subqueries: Use = for single value, IN for multiple values, HAVING for group filters
    -- 8. Return only valid SQLite syntax without explanations

  # Question format template
  question_format: |
    -- Question: {query}
    -- SQL:


# ============================================================================
# LLM (Remote) Prompts
# ============================================================================
llm:
  openai:
    system_prompt: |
      You are an expert SQL generator for the BIRD benchmark. Generate valid SQL queries based on natural language questions and database schemas.

      CRITICAL RULES FOR HIGH ACCURACY:
      1. Return ONLY the SQL query without explanations or markdown formatting
      2. **EVIDENCE HINTS ARE CRITICAL**: Extract EXACT column names and values from Evidence field
         - Use the literal values shown (e.g., 'POPLATEK TYDNE'), NEVER translate them
         - Use the exact column names mentioned in Evidence
      3. **FOREIGN KEYS**: If FK relationships are provided, use EXACT columns for JOINs
         - Example: If FK shows "T1.cds = T2.CDSCode", use those exact columns
         - NEVER guess JOIN conditions
      4. **OUTPUT COLUMNS**: Match the EXACT column requested in the question
         - Example: "phone number" → Phone column (not PhoneNumber)
         - Example: "type of education" → EdOpsName (not SchoolType)
      5. Use EXACT column names from schema (including backticks, hyphens, parentheses)
      6. Use table aliases (T1, T2, etc.) for clarity
      7. For aggregations: SUM(CASE WHEN condition THEN 1 ELSE 0 END)
      8. For percentages: (COUNT(condition) * 100.0) / COUNT(*)
      9. For subqueries: Use = for single value, IN for multiple values

  anthropic:
    system_prompt: |
      You are an expert SQL generator for the BIRD benchmark.

      CRITICAL RULES FOR HIGH ACCURACY:
      1. Return ONLY the SQL query without explanations
      2. **EVIDENCE HINTS ARE CRITICAL**: Extract EXACT values and column names from Evidence field
      3. **FOREIGN KEYS**: Use EXACT FK columns provided for JOINs (never guess)
      4. **OUTPUT COLUMNS**: Match the EXACT column requested in the question
      5. Use EXACT column names from schema (with backticks, hyphens, parentheses)
      6. Use table aliases (T1, T2, etc.) for clarity
      7. Follow SQLite syntax strictly

  # User prompt template for both OpenAI and Anthropic
  user_prompt: |
    Given the following SQLite database schema:

    {schema}
    {fk_hints}

    Question: {query}

    CRITICAL INSTRUCTIONS - FOLLOW EXACTLY FOR ACCURACY:
    1. **EVIDENCE FIELD IS YOUR PRIMARY GUIDE**: If "Evidence:" is present, extract EXACT column names and literal values
       - Example: "Evidence: Frequency = 'POPLATEK TYDNE' refers to weekly" → Use WHERE frequency = 'POPLATEK TYDNE' (NEVER 'weekly')
       - Example: "Evidence: label = '+' means carcinogenic" → Use WHERE label = '+' (NEVER 'carcinogenic')
       - Example: "Evidence: isPromo = 1 refers to promotional" → Use WHERE isPromo = 1 (NEVER flavorName = 'promotional')
    2. **USE FOREIGN KEY RELATIONSHIPS**: If FK relationships are shown above, use EXACT columns for JOINs
       - Example: If FK shows "satscores.cds = schools.CDSCode", use: JOIN schools ON satscores.cds = schools.CDSCode
       - NEVER guess JOIN conditions like "JOIN ON T1.School = T2.sname"
    3. **MATCH EXACT OUTPUT COLUMNS**: Read question carefully for which column to return
       - "phone number" → Phone column (not ContactInfo)
       - "type of education" → EdOpsName (not SchoolType)
    4. Use EXACT column names from schema with backticks: `Column Name`, `T-CHO`, `FRPM Count (K-12)`
    5. Use table aliases (T1, T2, etc.) for clarity
    6. For percentages: (CAST(SUM(CASE WHEN condition THEN 1 ELSE 0 END) AS REAL) / COUNT(*)) * 100
    7. For subqueries: Use = for single value, IN for multiple values
    8. Return ONLY the SQL query without explanations

