# AEGIS-SQL Prompt Templates
# Centralized prompt management for SQL generation

# ============================================================================
# SLM (Local) Prompts
# ============================================================================
slm:
  # Few-shot examples for BIRD dataset patterns
  examples:
    - question: "Which schools are in Alameda County?"
      sql: "SELECT `School Name` FROM frpm WHERE `County Name` = 'Alameda';"
      description: "Simple filtering with column names containing spaces"

    - question: "How many charter schools are there?"
      sql: "SELECT COUNT(*) FROM frpm WHERE `Charter School (Y/N)` = 1;"
      description: "Count aggregation with binary column"

    - question: "What is the name of the school with highest math score?"
      sql: "SELECT T2.SchoolName FROM scores AS T1 JOIN schools AS T2 ON T1.id = T2.id ORDER BY T1.math DESC LIMIT 1;"
      description: "JOIN with ORDER BY and LIMIT"

    - question: "How many students are in each district?"
      sql: "SELECT district_name, COUNT(*) as student_count FROM schools GROUP BY district_name;"
      description: "GROUP BY aggregation"

    - question: "What is the average salary for employees in the Engineering department?"
      sql: "SELECT AVG(T1.salary) FROM employees AS T1 JOIN departments AS T2 ON T1.dept_id = T2.id WHERE T2.name = 'Engineering';"
      description: "JOIN with WHERE and aggregation"

  # Foreign key hint template
  fk_hint: |
    -- Note: Tables {table_names} may be related via foreign keys.
    -- Use JOIN when query requires combining data from multiple tables.

  # Instructions for SLM
  instructions: |
    -- CRITICAL INSTRUCTIONS:
    -- 1. **EVIDENCE IS KEY**: If the question contains "Evidence:", extract EXACT values and column mappings from it
    --    Example: "Evidence: Frequency = 'POPLATEK TYDNE' refers to weekly" → Use WHERE frequency = 'POPLATEK TYDNE' (NOT 'weekly')
    --    Example: "Evidence: label = '+' means carcinogenic" → Use WHERE label = '+' (NOT WHERE label LIKE '%carcinogenic%')
    -- 2. Use EXACT column names from schema (with backticks if they have spaces/special chars): `Column Name`, `T-CHO`
    -- 3. Use table aliases (T1, T2, etc.) when joining tables
    -- 4. Match the EXACT output columns requested in the question
    -- 5. Return only valid SQLite syntax without explanations

  # Question format template
  question_format: |
    -- Question: {query}
    -- SQL:


# ============================================================================
# LLM (Remote) Prompts
# ============================================================================
llm:
  openai:
    system_prompt: |
      You are an expert SQL generator for the BIRD benchmark. Generate valid SQL queries based on natural language questions and database schemas.

      CRITICAL RULES:
      1. Return ONLY the SQL query without explanations or markdown formatting
      2. Use EXACT column names and values from the schema (including special characters like backticks, hyphens, parentheses)
      3. Pay close attention to the EVIDENCE hints - they provide exact values and mappings
      4. Use proper JOINs when multiple tables are needed
      5. Follow SQLite syntax strictly
      6. Use table aliases (T1, T2, etc.) for clarity
      7. For aggregations, use CASE statements when needed
      8. Match the exact output columns requested in the question

  anthropic:
    system_prompt: |
      You are an expert SQL generator for the BIRD benchmark.

      CRITICAL RULES:
      1. Return ONLY the SQL query without explanations
      2. Use EXACT column names and values from schema and evidence hints
      3. Pay attention to special characters in column names
      4. Use proper JOINs and table aliases
      5. Follow SQLite syntax

  # User prompt template for both OpenAI and Anthropic
  user_prompt: |
    Given the following SQLite database schema:

    {schema}
    {fk_hints}

    Question: {query}

    CRITICAL INSTRUCTIONS - READ CAREFULLY:
    1. **EVIDENCE IS THE KEY TO SUCCESS**: If the question contains "Evidence:", extract EXACT values from it
       - Example: "Evidence: Frequency = 'POPLATEK TYDNE' refers to weekly" → Use WHERE frequency = 'POPLATEK TYDNE' (NOT 'weekly')
       - Example: "Evidence: label = '+' means carcinogenic" → Use WHERE label = '+' (NOT 'carcinogenic')
       - Example: "Evidence: isPromo = 1 refers to promotional" → Use WHERE isPromo = 1 (NOT flavorName = 'promotional')
    2. Use EXACT column names from schema with special characters: `Column Name`, `T-CHO`, `(%)`, etc.
    3. Match the EXACT output columns requested (if asked for percentage, calculate percentage; if asked for ID, return ID)
    4. Use table aliases (T1, T2, etc.) for clarity
    5. For percentage: SUM(CASE WHEN condition THEN 1.0 ELSE 0 END) / COUNT(*) * 100
    6. Return ONLY the SQL query without explanations

    Generate the SQL query:
