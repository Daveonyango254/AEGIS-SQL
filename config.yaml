# AEGIS-SQL Configuration
# Three-Axis Constrained Optimization for Hybrid NL2SQL

# ============================================================================
# Language Configuration
# ============================================================================
language: english  # Supported: english, spanish, korean, chinese, swahili

# ============================================================================
# Embedding Model Configuration (Query Planner Agent)
# ============================================================================
embedding:
  model: BAAI/bge-m3  # Multilingual embedding model
  device: cuda  # cuda or cpu
  cache_dir: ~/.cache/huggingface  # HuggingFace cache directory
  adapter_path: null  # Optional: Path to LoRA adapter for fine-tuning
  batch_size: 32  # Batch size for embedding computation
  max_length: 512  # Maximum sequence length

# ============================================================================
# Local SLM Configuration (FSLM)
# ============================================================================
slm:
  model: cycloneboy/CscSQL-Merge-Qwen2.5-Coder-7B-Instruct #cycloneboy/SLM-SQL-1.5B  # Local SLM for SQL generation
  device: auto  # auto/cuda/cpu (auto for automatic device mapping)
  cache_dir: ~/.cache/huggingface  # HuggingFace cache directory
  hf_token: ${HF_HUB_TOKEN}  # HuggingFace token from .env
  adapter_path: null  # Optional: Path to LoRA adapter
  max_tokens: 512
  temperature: 0.0  # Greedy decoding (used by single-pass generate(); candidates use selection_temperature)
  torch_dtype: float16  # float16/bfloat16/float32
  trust_remote_code: true  # Trust remote code from HuggingFace

  # --- Harness optimization knobs (all default-on, individually toggleable for ablations) ---
  max_input_length: 8192        # Prompt token budget (raised from 2048 so the question is never truncated)
  use_chat_template: true       # Apply tokenizer chat template (system+user) for instruct models
  prompt_format: ddl            # 'ddl' (CREATE TABLE + few-shot; stable ~42% baseline) or 'm_schema' (experimental)
  full_schema: false            # Use top_k RAG retrieval (the stable baseline); true = inline the complete schema
  full_schema_max_columns: 160  # Fall back to top_k retrieval above this many total columns
  num_candidates: 3             # Execution-guided self-consistency: local-SLM candidates per query (1 = single greedy)
  selection_temperature: 0.8    # Sampling temperature for the non-greedy candidates
  enable_value_grounding: true  # Inject sampled DB values / value-linking hints into the prompt
  enable_cast_fix: true         # Wrap division numerators in CAST(... AS REAL) (fixes integer-division ratio bugs)
  expose_keys: true             # Show real foreign keys (JOIN hints) + PRIMARY KEY markers in the DDL prompt
  retrieval_top_k: 80           # Schema columns retrieved before FK expansion (raised from 40)
  adaptive_retrieval: false     # Corrective RAG: prune to anchor tables + FK neighbours (cuts table noise; ~99% recall already)
  retrieval_anchor_top_n: 12    # Top retrieved columns whose tables define the anchor set
  max_expanded_tables: 3        # Max FK-connected tables added to the anchors

# ============================================================================
# Remote LLM Configuration (FLLM)
# ============================================================================
llm:
  provider: openai  # openai or anthropic
  model: gpt-4o  # gpt-4o, gpt-4-turbo, claude-3-5-sonnet-20241022, etc.
  api_key: ${OPENAI_API_KEY}  # Load from .env
  temperature: 0.0
  max_tokens: 512
  timeout: 30  # Request timeout in seconds
  max_retries: 3  # Maximum number of retries on failure
  retry_delay: 1.0  # Initial delay between retries (exponential backoff)

# ============================================================================
# Privacy Configuration (DP Abstraction)
# ============================================================================
privacy:
  epsilon: 1.0  # ε privacy budget (0 = disable abstraction)
  abstraction_enabled: true  # Enable DP abstraction for remote queries
  value_aware_abstraction: true  # Abstract only value-like tokens (proper nouns/literals), never schema words like 'name'/'price'
  reconstruction_enabled: true  # Enable reconstruction (must match abstraction_enabled)
  placeholder_vocab_size: 100  # Number of semantic placeholders in V_abs

  sensitivity_policy:
    pii: true  # Protect PII (names, emails, SSN, etc.)
    proprietary: true  # Protect proprietary schema/data
    regulated: true  # Protect regulated data (medical, financial)

# ============================================================================
# Cost Configuration
# ============================================================================
cost:
  budget_per_query: 0.01  # USD budget per query
  remote_token_cost: 0.000015  # Cost per token for remote LLM (GPT-4o pricing)
  local_compute_cost: 0.0001  # Fixed cost per local SLM inference

# ============================================================================
# Router Configuration (Content-Independent Routing)
# ============================================================================
router:
  threshold_complexity: 0.5  # Complexity threshold (0-1): >= threshold → REMOTE (lowered from 0.7 route ~98% to REMOTE)
  force_local: false  # Force all queries to local FSLM (overrides threshold)
  force_remote: false  # Force all queries to remote FLLM (overrides threshold)
  features:
    - query_token_count
    - schema_element_count
    - query_structural_complexity

# ============================================================================
# Query Ambiguity Resolution (Optional Enhancement - DISABLED BY DEFAULT)
# ============================================================================
ambiguity:
  enabled: false  # Set to true to enable ambiguity detection and resolution
  detector_type: "rules"  # "rules" (fast, local, zero-cost) or "llm" (higher accuracy)
  resolution_mode: "auto"  # "auto" (use defaults) or "interactive" (ask user)
  auto_resolve_temporal: true  # Automatically resolve temporal ambiguities
  temporal_default_days: 30  # Default interpretation for "recent" queries
  confidence_threshold: 0.6  # Minimum confidence (0-1) to flag ambiguity

# ============================================================================
# Verifier Configuration (Neuro-Symbolic Verification)
# ============================================================================
verifier:
  grammar_check: true  # Enable grammar verification (sqlglot parser)
  schema_check: true  # Enable schema verification
  execution_check_slm: true  # Enable execution verification for SLM outputs
  execution_check_llm: true  # Enable execution verification for LLM outputs
  sample_size: 100  # Number of rows for execution verification
  timeout_seconds: 5  # Execution timeout per query
  max_repair_attempts: 1  # Self-correction regenerations when verification fails (0 disables the repair loop)
  repair_on_empty: true  # Treat an executed-but-empty result as a soft fail to trigger one value-aware repair

# ============================================================================
# Evaluation Configuration
# ============================================================================
evaluation:
  bird_dev_path: ./data/bird_dev  # Path to BIRD-dev benchmark
  output_dir: ./results  # Evaluation results directory
  seed: 42  # Fixed seed for reproducibility
  metrics:
    - execution_accuracy  # EX metric
    - ves  # Valid Efficiency Score
    - privacy_loss  # ℒ_priv = ε × E[|prompt|] × Pr(r=remote)
    - cost_per_query  # USD per query
    - latency  # End-to-end latency

# ============================================================================
# Logging Configuration
# ============================================================================
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  format: json  # json or text
  file: ./logs/aegis_sql.log
  track_routing: true
  track_privacy: true
  track_verification: true
  track_latency: true

# ============================================================================
# Configuration Presets (uncomment to use)
# ============================================================================

# --- LOCAL-ONLY MODE ---
# Forces all queries to local FSLM (zero privacy leakage, no API costs)
# router:
#   force_local: true
# OR set budget to 0:
# cost:
#   budget_per_query: 0.0

# --- REMOTE-ONLY MODE ---
# Forces all queries to remote FLLM (maximum accuracy, higher cost)
# router:
#   force_remote: true
# OR set threshold to 0:
# router:
#   threshold_complexity: 0.0

# --- NO ABSTRACTION MODE ---
# Disables DP abstraction (WARNING: sensitive data sent to remote LLM!)
# privacy:
#   abstraction_enabled: false
#   reconstruction_enabled: false
# OR set epsilon to 0:
# privacy:
#   epsilon: 0.0

# --- HYBRID MODE (DEFAULT) ---
# Automatic routing based on complexity and cost
# Abstraction enabled for remote queries
# (Current configuration above)
