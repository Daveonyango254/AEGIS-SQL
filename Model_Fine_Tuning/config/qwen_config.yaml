# Fine-tuning configuration for Qwen/Qwen2.5-Coder-7B-Instruct
# Qwen2.5-Coder: 7B parameter code-specialized multilingual model

model:
  name: "Qwen/Qwen2.5-Coder-7B-Instruct"
  trust_remote_code: true
  torch_dtype: "bfloat16"  # Qwen2.5 supports bfloat16
  device_map: "auto"

# LoRA configuration (Parameter-Efficient Fine-Tuning)
lora:
  r: 16                    # LoRA rank
  lora_alpha: 32           # Alpha scaling
  lora_dropout: 0.05       # Dropout for regularization
  target_modules:          # Qwen2.5 architecture
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# Training hyperparameters
training:
  num_epochs: 3
  per_device_train_batch_size: 4    # Can use larger batch for 7B model
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4    # Effective batch = 4 * 4 = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1                 # 10% warmup
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  fp16: false
  bf16: true
  gradient_checkpointing: true      # Memory optimization
  optim: "adamw_torch"
  seed: 42

# Data configuration
data:
  train_file: "../data/bird_train_formatted.json"
  eval_file: "../data/bird_eval_formatted.json"
  max_seq_length: 2048
  preprocessing_num_workers: 4

# Output configuration
output:
  output_dir: "../checkpoints/qwen"
  hub_model_id: "Daveonyango254/aegis-sql-qwen25-coder-7b-lora"
  push_to_hub: true
  hub_strategy: "checkpoint"
  hub_private_repo: false

# Early stopping
early_stopping:
  enabled: true
  patience: 3
  metric: "eval_loss"
  greater_is_better: false
