# AEGIS-SQL Configuration — REMOTE gpt-4o ORACLE RUN (no abstraction)
#
# Purpose: swap the local 7B SLM for remote gpt-4o under the SAME conditions as
# the force_local SLM baseline (same 100 queries / seed 42, same RAG retrieval,
# same DDL prompt with FK/PK exposure, same verifier + 1 repair) to measure
# gpt-4o's raw NL2SQL ceiling vs the ~45% SLM baseline.
#
# DP abstraction + reconstruction are DISABLED here (epsilon=0) so we measure the
# model, not the privacy round-trip. The abstraction/reconstruction code is
# unchanged in the codebase — this is a config-only bypass for the experiment.
#
# Run:
#   OPENAI_API_KEY=... python run_full_evaluation.py --config config_remote_gpt4o.yaml \
#       --num_queries 100 --seed 42 --stratify --output_name exp_remote_gpt4o
#   python evaluation/analyze_retrieval.py evaluation/output/exp_remote_gpt4o/predictions.jsonl

language: english

# ============================================================================
# Embedding Model Configuration (Query Planner Agent) — retrieval unchanged
# ============================================================================
embedding:
  model: BAAI/bge-m3
  device: cuda
  cache_dir: ~/.cache/huggingface
  adapter_path: null
  batch_size: 32
  max_length: 512

# ============================================================================
# Local SLM Configuration (FSLM) — not loaded on a force_remote run, but the
# retrieval knobs below must match the SLM baseline for a like-for-like compare.
# ============================================================================
slm:
  model: cycloneboy/CscSQL-Merge-Qwen2.5-Coder-7B-Instruct
  device: auto
  cache_dir: ~/.cache/huggingface
  hf_token: ${HF_HUB_TOKEN}
  adapter_path: null
  max_tokens: 512
  temperature: 0.0
  torch_dtype: float16
  trust_remote_code: true
  max_input_length: 8192
  use_chat_template: true
  full_schema: false
  full_schema_max_columns: 160
  num_candidates: 3
  selection_temperature: 0.8
  enable_value_grounding: true
  enable_cast_fix: true
  expose_keys: true             # FK/PK exposure now mirrored into the remote prompt too
  retrieval_top_k: 80
  max_expanded_tables: 3

# ============================================================================
# Remote LLM Configuration (FLLM) — the model under test
# ============================================================================
llm:
  provider: openai
  model: gpt-4o
  api_key: ${OPENAI_API_KEY}
  temperature: 0.0
  max_tokens: 512
  timeout: 30
  max_retries: 3
  retry_delay: 1.0

# ============================================================================
# Privacy Configuration — DISABLED for this oracle run (measure the model only)
# ============================================================================
privacy:
  epsilon: 0.0                  # 0 = no DP abstraction
  abstraction_enabled: false
  value_aware_abstraction: true
  reconstruction_enabled: false
  placeholder_vocab_size: 100
  sensitivity_policy:
    pii: true
    proprietary: true
    regulated: true

# ============================================================================
# Cost Configuration
# ============================================================================
cost:
  budget_per_query: 0.01
  remote_token_cost: 0.000015
  local_compute_cost: 0.0001

# ============================================================================
# Router Configuration — force every query to the remote LLM
# ============================================================================
router:
  threshold_complexity: 0.5
  force_local: false
  force_remote: true
  features:
    - query_token_count
    - schema_element_count
    - query_structural_complexity

# ============================================================================
# Query Ambiguity Resolution — off (matches baseline)
# ============================================================================
ambiguity:
  enabled: false
  detector_type: "rules"
  resolution_mode: "auto"
  auto_resolve_temporal: true
  temporal_default_days: 30
  confidence_threshold: 0.6

# ============================================================================
# Verifier Configuration — same as the SLM baseline (1 repair attempt)
# ============================================================================
verifier:
  grammar_check: true
  schema_check: true
  execution_check_slm: true
  execution_check_llm: true
  sample_size: 100
  timeout_seconds: 5
  max_repair_attempts: 1        # repair is now path-aware → remote query repairs with gpt-4o
  repair_on_empty: true

# ============================================================================
# Evaluation Configuration
# ============================================================================
evaluation:
  bird_dev_path: ./data/bird_dev
  output_dir: ./results
  seed: 42
  metrics:
    - execution_accuracy
    - ves
    - privacy_loss
    - cost_per_query
    - latency

# ============================================================================
# Logging Configuration
# ============================================================================
logging:
  level: INFO
  format: json
  file: ./logs/aegis_sql.log
  track_routing: true
  track_privacy: true
  track_verification: true
  track_latency: true
